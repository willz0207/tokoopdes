services:
  - type: web
    name: tokokopdes-willz0207
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_ADMIN_EMAIL
        value: admin@franchise.local
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_MANAGER_EMAIL
        value: manager@franchise.local
      - key: APP_MANAGER_PASSWORD
        sync: false
      - key: APP_CASHIER_EMAIL
        value: cashier@franchise.local
      - key: APP_CASHIER_PASSWORD
        sync: false
